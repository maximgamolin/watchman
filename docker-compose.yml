version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./dockerdata/postgres:/var/lib/postgresql/data
    ports:
      - '9432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./dockerdata/redis:/data
    ports:
      - '9379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Alembic migrations (одноразовый контейнер) ───────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: alembic upgrade head
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # ── Telegram Bot ──────────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: python -m app.main
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: celery -A app.infrastructure.celery.app.celery_app worker --loglevel=info
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Celery Beat (планировщик периодических задач) ─────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: celery -A app.infrastructure.celery.app.celery_app beat --loglevel=info
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

